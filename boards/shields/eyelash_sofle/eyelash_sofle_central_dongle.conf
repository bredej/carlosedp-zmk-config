#EXT POWER
CONFIG_ZMK_EXT_POWER=y

# 3 profiles (n+2)
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6

# dongle mode
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# display
CONFIG_ZMK_DISPLAY=y
CONFIG_BT_BAS=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Enable SPI
CONFIG_SPI=y

# RGB underglow behavior must be compiled on central so the behavior device
# exists when processing the keymap; without this, rgb_ug bindings are
# transparent (return 1) causing fall-through to the base layer (printing zxcvb).
# EXT_POWER and ON_START must be explicitly disabled: Kconfig.defaults sets both
# to 'y' whenever ZMK_RGB_UNDERGLOW=y. Without overrides, RGB_OFF would call
# ext_power_disable() on the dongle (potentially cutting VEXT before the BLE
# packet reaches the peripherals), and a 50ms idle timer would run for nothing.
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n
